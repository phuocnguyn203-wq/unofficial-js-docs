<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<meta name="description" content="{{DESCRIPTION}}">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%23f2c94c'/%3E%3Ctext x='12' y='17' font-family='monospace' font-weight='700' font-size='12' text-anchor='middle' fill='%2314151a'%3EJS%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="{{ASSET_PREFIX}}assets/css/style.css">
</head>
<body class="{{BODY_CLASS}}">
<script>window.ROOT_PREFIX = "{{ROOT_PREFIX}}";</script>
<a class="skip-link" href="#main-content">Skip to content</a>

<header class="site-header">
  <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
    <span></span><span></span><span></span>

  <a class="brand" href="{{ROOT_PREFIX}}index.html">
    <span class="brand-mark" aria-hidden="true">JS</span>
    <span class="brand-name">JS Docs</span>
  </a>

  <div class="header-search">
    <button class="search-trigger" id="search-trigger" aria-label="Search documentation">
      <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 5L20.49 19l-5-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
      <span>Search docs</span>
      <kbd>/</kbd>
    </button>
  </div>

  <nav class="header-links">
    <a href="{{ROOT_PREFIX}}docs/introduction.html">Docs</a>
    <a href="{{GITHUB_URL}}" target="_blank" rel="noopener" class="header-github" aria-label="View source on GitHub">
      <svg viewBox="0 0 16 16" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
    </a>
  </nav>
</header>

<div class="search-overlay" id="search-overlay">
  <div class="search-panel">
    <div class="search-input-row">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 5L20.49 19l-5-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
      <input type="text" id="search-input" placeholder="Search topics, functions, concepts&hellip;" autocomplete="off" spellcheck="false">
      <kbd class="search-esc">Esc</kbd>
    </div>
    <div class="search-results" id="search-results">
      <p class="search-hint">Type to search across the whole guide &mdash; try &ldquo;closures&rdquo;, &ldquo;promise&rdquo; or &ldquo;array&rdquo;.</p>
    </div>
  </div>
</div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav" aria-label="Documentation sections">
{{NAV_HTML}}
    </nav>
  </aside>

  <main class="content" id="main-content">
    <div class="content-inner">
{{CONTENT}}
{{PREV_NEXT_HTML}}
      <footer class="page-footer">
        <p>Built as a static, open guide to JavaScript &mdash; no backend, just HTML, CSS &amp; JS. &copy; {{YEAR}}.</p>
      </footer>
    </div>
  </main>

  <aside class="toc" id="toc">
{{TOC_HTML}}
  </aside>
</div>

<div class="sidebar-backdrop" id="sidebar-backdrop"></div>

<script src="{{ASSET_PREFIX}}assets/js/search-index.js"></script>
<script src="{{ASSET_PREFIX}}assets/js/highlight.js"></script>
<script src="{{ASSET_PREFIX}}assets/js/search.js"></script>
<script src="{{ASSET_PREFIX}}assets/js/main.js"></script>
</body>
</html>
